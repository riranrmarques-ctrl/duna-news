<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Duna News</title>
</head>

<body style="background:black; color:white; font-family:Arial;">

<h1 id="titulo">Carregando...</h1>
<img id="img" width="600">

<script>
async function carregar() {

  const res = await fetch("/.netlify/functions/news");
  const data = await res.json();

  document.getElementById("titulo").innerText = data[0].titulo;
  document.getElementById("img").src = data[0].imagem;
}

carregar();
</script>

</body>
</html>
