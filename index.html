<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duna News</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    .background {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.58);
      transition: opacity 0.6s ease;
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.88), rgba(0,0,0,0.12));
      z-index: 1;
    }

    .logo-topo {
      position: absolute;
      top: 10px;
      left: 30px;
      z-index: 3;
      width: 420px;
      max-width: 35vw;
    }

    .qr-box {
      position: absolute;
      bottom: 30px;
      right: 30px;
      z-index: 3;
      background: rgba(0,0,0,0.72);
      padding: 16px;
      border-radius: 18px;
      text-align: center;
      width: 240px;
      backdrop-filter: blur(4px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
      text-decoration: none;
      color: #fff;
    }

    .qr-box img {
      width: 180px;
      height: 180px;
      object-fit: contain;
      background: #fff;
      padding: 8px;
      border-radius: 10px;
    }

    .qr-texto {
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
      white-space: nowrap;
    }

    .conteudo {
      position: absolute;
      left: 34px;
      right: 320px;
      bottom: 34px;
      z-index: 3;
    }

    .fonte {
      font-size: 18px;
      color: #2ec5ff;
      margin-bottom: 12px;
    }

    .titulo {
      font-size: 54px;
      font-weight: bold;
      line-height: 1.08;
      max-width: 1180px;
      text-shadow: 0 4px 16px rgba(0,0,0,0.55);
    }

    @media (max-width: 1200px) {
      .titulo {
        font-size: 42px;
      }

      .logo-topo {
        width: 300px;
      }

      .qr-box {
        width: 200px;
        bottom: 20px;
        right: 20px;
      }

      .qr-box img {
        width: 150px;
        height: 150px;
      }

      .qr-texto {
        font-size: 16px;
      }

      .conteudo {
        right: 250px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img id="imagem" class="background" src="" alt="Imagem da notícia" />
    <div class="overlay"></div>

    <img class="logo-topo" src="logo.png" alt="Duna News" />

    <a id="qrLink" class="qr-box" href="https://ilheuseventos.com.br/" target="_blank" rel="noopener noreferrer">
      <img id="qrCode" src="adobe-express-qr-code.png" alt="QR Code" />
      <div class="qr-texto">Veja a notícia no site</div>
    </a>

    <div class="conteudo">
      <div class="fonte">Fonte: Ilhéus Eventos</div>
      <div id="titulo" class="titulo">Carregando...</div>
    </div>
  </div>

  <script>
    const imagemEl = document.getElementById("imagem");
    const tituloEl = document.getElementById("titulo");
    const qrLinkEl = document.getElementById("qrLink");
    const qrCodeEl = document.getElementById("qrCode");

    let noticias = [];
    let indiceAtual = 0;

    function mostrarNoticia(index) {
      if (!noticias.length) return;

      const noticia = noticias[index];

      tituloEl.innerText = noticia.titulo || "Sem título";

      if (noticia.imagem) {
        imagemEl.style.display = "block";
        imagemEl.src = noticia.imagem;
      } else {
        imagemEl.style.display = "none";
      }

      if (noticia.link) {
        qrLinkEl.href = noticia.link;
        qrCodeEl.src = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(noticia.link)}`;
      } else {
        qrLinkEl.href = "https://ilheuseventos.com.br/";
      }
    }

    fetch("/.netlify/functions/news")
      .then(res => {
        if (!res.ok) throw new Error("Erro ao carregar notícias");
        return res.json();
      })
      .then(data => {
        noticias = Array.isArray(data) ? data : [];

        if (!noticias.length) {
          tituloEl.innerText = "Nenhuma notícia encontrada";
          return;
        }

        mostrarNoticia(indiceAtual);

        if (noticias.length > 1) {
          setInterval(() => {
            indiceAtual = (indiceAtual + 1) % noticias.length;
            mostrarNoticia(indiceAtual);
          }, 10000);
        }
      })
      .catch(() => {
        tituloEl.innerText = "Erro ao carregar notícias";
        imagemEl.style.display = "none";
      });

    imagemEl.addEventListener("error", () => {
      imagemEl.style.display = "none";
    });
  </script>
</body>
</html>
