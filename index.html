<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Duna News</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: black;
      color: white;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
    }

    .background {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.6);
    }

    .overlay {
      position: absolute;
      bottom: 0;
      padding: 40px;
      width: 100%;
      background: linear-gradient(transparent, rgba(0,0,0,0.9));
    }

    .fonte {
      font-size: 18px;
      color: #00bfff;
      margin-bottom: 10px;
    }

    .titulo {
      font-size: 48px;
      font-weight: bold;
      max-width: 80%;
      line-height: 1.2;
    }
  </style>
</head>

<body>

  <div class="container">
    <img id="imagem" class="background" src="">
    
    <div class="overlay">
      <div class="fonte">Fonte: Ilhéus Eventos</div>
      <div id="titulo" class="titulo">Carregando...</div>
    </div>
  </div>

  <script>
    fetch("/.netlify/functions/news")
      .then(res => res.json())
      .then(data => {
        document.getElementById("titulo").innerText = data[0].titulo;
        document.getElementById("imagem").src = data[0].imagem;
      });
  </script>

</body>
</html>
