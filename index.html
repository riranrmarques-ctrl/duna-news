<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Duna News</title>

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      font-family: Arial, sans-serif;
      background: #000;
      color: #fff;
      overflow: hidden;
    }

    .container {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: #000;
    }

    .background {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: brightness(0.58);
    }

    .overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,0.88), rgba(0,0,0,0.12));
      z-index: 1;
    }

    .logo-topo {
      position: absolute;
      top: 26px;
      left: 30px;
      z-index: 3;
      width: 320px;
      max-width: 28vw;
    }

    .qr-box {
      position: absolute;
      top: 26px;
      right: 30px;
      z-index: 3;
      background: rgba(0,0,0,0.72);
      padding: 16px;
      border-radius: 18px;
      text-align: center;
      width: 220px;
      backdrop-filter: blur(4px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
    }

    .qr-box img {
      width: 180px;
      height: 180px;
      object-fit: contain;
      background: #fff;
      padding: 8px;
      border-radius: 10px;
    }

    .qr-texto {
      margin-top: 10px;
      font-size: 20px;
      font-weight: bold;
      line-height: 1.2;
    }

    .conteudo {
      position: absolute;
      left: 34px;
      right: 34px;
      bottom: 34px;
      z-index: 3;
    }

    .fonte {
      font-size: 18px;
      color: #2ec5ff;
      margin-bottom: 12px;
    }

    .titulo {
      font-size: 54px;
      font-weight: bold;
      line-height: 1.08;
      max-width: 1180px;
      text-shadow: 0 4px 16px rgba(0,0,0,0.55);
    }

    @media (max-width: 1200px) {
      .titulo {
        font-size: 42px;
      }

      .logo-topo {
        width: 240px;
      }

      .qr-box {
        width: 180px;
      }

      .qr-box img {
        width: 140px;
        height: 140px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <img id="imagem" class="background" src="" alt="Imagem da notícia" />
    <div class="overlay"></div>

    <img class="logo-topo" src="imagem.png" alt="Ilhéus Eventos" />

    <div class="qr-box">
      <img src="adobe-express-qr-code.png" alt="QR Code" />
      <div class="qr-texto">Veja a notícia no site</div>
    </div>

    <div class="conteudo">
      <div class="fonte">Fonte: Ilhéus Eventos</div>
      <div id="titulo" class="titulo">Carregando...</div>
    </div>
  </div>

  <script>
    fetch("/.netlify/functions/news")
      .then(res => {
        if (!res.ok) throw new Error("Erro ao carregar notícia");
        return res.json();
      })
      .then(data => {
        const noticia = data[0] || {};
        document.getElementById("titulo").innerText = noticia.titulo || "Sem título";

        if (noticia.imagem) {
          document.getElementById("imagem").src = noticia.imagem;
        }
      })
      .catch(() => {
        document.getElementById("titulo").innerText = "Erro ao carregar notícia";
      });
  </script>
</body>
</html>
